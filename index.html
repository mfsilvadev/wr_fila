<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fila Wild Rift</title>
</head>
<link rel="stylesheet" href="style.css">

<body>

<div class="app-container">

  <h1>Fila Wild Rift</h1>

  <div class="form-section">
    <input id="name" placeholder="Nome">

    <div id="laneSelect">
      <label><input type="checkbox" value="top"> Top</label>
      <label><input type="checkbox" value="jg"> Jungle</label>
      <label><input type="checkbox" value="mid"> Mid</label>
      <label><input type="checkbox" value="adc"> ADC</label>
      <label><input type="checkbox" value="sup"> Support</label>
    </div>

    <input id="lives" type="number" value="1" min="1" style="width:60px;">
    <button id="addBtn">Adicionar</button>
  </div>


  <div class="container">
    <div class="box">
      <h2>Party <button id="loseAllBtn">💥 Todos perderam</button></h2>
      
      <div id="party"></div>
    </div>

    <div class="box">
      <h2>Fila</h2>
      <div id="queue"></div>
    </div>
  </div>

  <h2>🔎 Histórico</h2>
  <input id="searchPlayer" placeholder="Buscar player..." />
  <div id="history"></div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
