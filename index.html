<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fila Wild Rift</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

  <h1>
    Fila Wild Rift 
    <button id="configBtn">⚙️</button>
  </h1>

  <div class="form-section">
    <input id="name" placeholder="Nome">

    <div id="laneSelect">
      <label><input type="checkbox" value="top"> Top</label>
      <label><input type="checkbox" value="jg"> Jungle</label>
      <label><input type="checkbox" value="mid"> Mid</label>
      <label><input type="checkbox" value="adc"> ADC</label>
      <label><input type="checkbox" value="sup"> Support</label>
    </div>

    <input id="lives" type="number" value="1" min="1" style="width:60px;">
    <button id="addBtn">Adicionar</button>
  </div>

  <div class="container">
    <div class="box">
      <h2>Party <button id="loseAllBtn">Todos perderam</button></h2>
      <div id="party"></div>
    </div>

    <div class="box">
      <h2>Fila</h2>
      <div id="queue"></div>
    </div>
  </div>

  <h2>Histórico</h2>
  <input id="searchPlayer" placeholder="Buscar player..." />
  <div id="history"></div>

</div>

<button id="resetBtn">🧹 Resetar tudo</button>

<!-- ⚙️ MODAL DE CONFIG -->
<div id="configModal" class="modal hidden">
  <div class="modal-content">

    <h3>⚙️ Configurações</h3>

    <label>Sua Lane:</label>
    <select id="configHostLane">
      <option value="">Nenhuma</option>
      <option value="top">Top</option>
      <option value="jg">Jungle</option>
      <option value="mid">Mid</option>
      <option value="adc">ADC</option>
      <option value="sup">Support</option>
    </select>

    <label>Máx entradas por player:</label>
    <input id="configMaxEntries" type="number" min="1" value="3"/>

    <div class="modal-actions">
      <button id="saveConfig">Salvar</button>
      <button id="closeConfig">Fechar</button>
    </div>

  </div>
</div>

<script type="module" src="js/app.js"></script>

<footer class="footer">
  <div class="footer-content">

    <div class="socials">
      <a href="https://twitch.tv/tetelkasz" target="_blank">🎮 Twitch</a>
      <a href="https://twitter.com/tetelkasz" target="_blank">🐦 Twitter</a>
      <a href="https://github.com/mfsilvadev" target="_blank">💻 GitHub</a>
    </div>

    <div class="support">
      <a href="https://pixgg.com/Tetelkasz" target="_blank">❤️ Apoie o projeto</a>
    </div>

  </div>
</footer>

</body>
</html>
