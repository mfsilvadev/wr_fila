<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fila Wild Rift</title>
<link rel="stylesheet" href="style.css">

<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="app-container">

  <h1>
    Fila Wild Rift 
    <button id="configBtn" class="icon-btn" title="Configurações">
      <i data-lucide="settings"></i>
    </button>
  </h1>

  <!-- FORM -->
  <div class="form-section">
    <input id="name" placeholder="Nome">

    <div id="laneSelect" class="lane-select">
      <label><input type="checkbox" value="top"> Top</label>
      <label><input type="checkbox" value="jg"> Jungle</label>
      <label><input type="checkbox" value="mid"> Mid</label>
      <label><input type="checkbox" value="adc"> ADC</label>
      <label><input type="checkbox" value="sup"> Support</label>
    </div>

    <input id="lives" type="number" value="1" min="1" style="width:60px;">

    <button id="addBtn" class="btn">Adicionar</button>
  </div>

  <!-- PARTY / FILA -->
  <div class="container">

    <div class="box">
      <h2>
        Party 
        <button id="loseAllBtn" class="btn">Todos perdem vida</button>
      </h2>
      <div id="party"></div>
    </div>

    <div class="box">
      <h2>Fila</h2>
      <input id="searchQueue" placeholder="Buscar na fila..." />
      <div id="queue"></div>
    </div>

  </div>

  <!-- HISTÓRICO -->
  <h2>Histórico</h2>
  <input id="searchPlayer" placeholder="Buscar player..." />
  <div id="history"></div>

</div>

<!-- RESET -->
<button id="resetBtn" class="btn">🧹 Resetar tudo</button>

<!-- MODAL CONFIG -->
<div id="configModal" class="modal hidden">
  <div class="modal-content">

    <h3>⚙️ Configurações</h3>

    <label>Sua Lane:</label>
    <select id="configHostLane">
      <option value="">Nenhuma</option>
      <option value="top">Top</option>
      <option value="jg">Jungle</option>
      <option value="mid">Mid</option>
      <option value="adc">ADC</option>
      <option value="sup">Support</option>
    </select>

    <label>Máx entradas por player:</label>
    <input id="configMaxEntries" type="number" min="1" value="3"/>

    <div class="modal-actions">
      <button id="saveConfig" class="btn">Salvar</button>
      <button id="closeConfig" class="btn">Fechar</button>
    </div>

  </div>
</div>

<script type="module" src="js/app.js"></script>

<footer class="footer">
  <div class="footer-content">

    <div class="socials">
      <a href="https://twitch.tv/tetelkasz" target="_blank">🎮 Twitch</a>
      <a href="https://twitter.com/tetelkasz" target="_blank">🐦 Twitter</a>
      <a href="https://github.com/mfsilvadev" target="_blank">💻 GitHub</a>
    </div>

    <div class="support">
      <a href="https://pixgg.com/Tetelkasz" target="_blank">❤️ Apoie o projeto</a>
    </div>

  </div>
</footer>

</body>
</html>
